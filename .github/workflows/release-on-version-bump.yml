name: Release On Version Bump

on:
  push:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_PATH: src/KeyUtils.csproj
  NPM_SCOPE: '@farsight-cda'
  NPM_META_PACKAGE: '@farsight-cda/keyutils'
  NPM_LINUX_PACKAGE: '@farsight-cda/keyutils-linux-x64'
  NPM_WINDOWS_PACKAGE: '@farsight-cda/keyutils-win-x64'

jobs:
  prepare:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    outputs:
      assembly_name: ${{ steps.project.outputs.assembly_name }}
      version: ${{ steps.project.outputs.version }}
      tag: ${{ steps.project.outputs.tag }}
      should_release: ${{ steps.tag_check.outputs.should_release }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Read project metadata
        id: project
        shell: bash
        run: |
          project_json="$(dotnet msbuild "$PROJECT_PATH" -nologo -getProperty:AssemblyName -getProperty:Version)"
          assembly_name="$(printf '%s' "$project_json" | jq -r '.Properties.AssemblyName')"
          version="$(printf '%s' "$project_json" | jq -r '.Properties.Version')"
          tag="v$version"

          echo "assembly_name=$assembly_name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check whether the tag already exists
        id: tag_check
        shell: bash
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.project.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  create_release:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Create tag and draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh api "repos/${{ github.repository }}/git/refs" \
            -f ref="refs/tags/$TAG" \
            -f sha="${{ github.sha }}"

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            --draft

  build:
    needs:
      - prepare
      - create_release
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive_extension: .tar.gz
          - os: windows-latest
            rid: win-x64
            archive_extension: .zip
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install Linux Native AOT prerequisites
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish ${{ matrix.rid }} binary
        run: dotnet publish ${{ env.PROJECT_PATH }} -c Release -r ${{ matrix.rid }} --self-contained true -o artifacts/publish/${{ matrix.rid }}

      - name: Upload publish output for npm packaging
        uses: actions/upload-artifact@v6
        with:
          name: publish-${{ matrix.rid }}
          path: artifacts/publish/${{ matrix.rid }}

      - name: Stage release bundle
        id: asset
        shell: bash
        run: |
          bundle_name="${{ needs.prepare.outputs.assembly_name }}-${{ needs.prepare.outputs.tag }}-${{ matrix.rid }}"
          bundle_dir="artifacts/bundle/${bundle_name}"

          rm -rf "$bundle_dir"
          mkdir -p "$bundle_dir" artifacts/release
          cp -r artifacts/publish/${{ matrix.rid }}/. "$bundle_dir/"

          echo "bundle_name=$bundle_name" >> "$GITHUB_OUTPUT"

      - name: Archive Linux release bundle
        if: runner.os == 'Linux'
        id: archive_linux
        shell: bash
        run: |
          asset_name="${{ steps.asset.outputs.bundle_name }}${{ matrix.archive_extension }}"
          tar -C artifacts/bundle -czf "artifacts/release/${asset_name}" "${{ steps.asset.outputs.bundle_name }}"

          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Archive Windows release bundle
        if: runner.os == 'Windows'
        id: archive_windows
        shell: pwsh
        run: |
          $assetName = "${{ steps.asset.outputs.bundle_name }}${{ matrix.archive_extension }}"
          Compress-Archive -Path "artifacts/bundle/${{ steps.asset.outputs.bundle_name }}" -DestinationPath "artifacts/release/$assetName" -Force

          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve release asset name
        id: archive
        shell: bash
        run: |
          asset_name="${{ steps.archive_linux.outputs.asset_name || steps.archive_windows.outputs.asset_name }}"
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"

      - name: Upload asset to draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release upload "$TAG" "artifacts/release/${{ steps.archive.outputs.asset_name }}" \
            --repo "${{ github.repository }}" \
            --clobber

  publish_npm:
    needs:
      - prepare
      - create_release
      - build
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download Linux publish output
        uses: actions/download-artifact@v7
        with:
          name: publish-linux-x64
          path: artifacts/publish/linux-x64

      - name: Download Windows publish output
        uses: actions/download-artifact@v7
        with:
          name: publish-win-x64
          path: artifacts/publish/win-x64

      - name: Prepare npm packages
        env:
          KEYUTILS_ASSEMBLY_NAME: ${{ needs.prepare.outputs.assembly_name }}
        run: node scripts/prepare-npm-packages.mjs

      - name: Publish Linux npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          if npm view "${{ env.NPM_LINUX_PACKAGE }}@$VERSION" version >/dev/null 2>&1; then
            echo "${{ env.NPM_LINUX_PACKAGE }}@$VERSION already exists; skipping publish"
          else
            npm publish artifacts/npm/linux-x64 --access public
          fi

      - name: Publish Windows npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          if npm view "${{ env.NPM_WINDOWS_PACKAGE }}@$VERSION" version >/dev/null 2>&1; then
            echo "${{ env.NPM_WINDOWS_PACKAGE }}@$VERSION already exists; skipping publish"
          else
            npm publish artifacts/npm/win-x64 --access public
          fi

      - name: Publish meta npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          if npm view "${{ env.NPM_META_PACKAGE }}@$VERSION" version >/dev/null 2>&1; then
            echo "${{ env.NPM_META_PACKAGE }}@$VERSION already exists; skipping publish"
          else
            npm publish artifacts/npm/meta --access public
          fi

  publish_release:
    needs:
      - prepare
      - create_release
      - build
      - publish_npm
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release edit "$TAG" \
            --repo "${{ github.repository }}" \
            --draft=false

  cleanup_release:
    needs:
      - prepare
      - create_release
      - build
      - publish_npm
    if: failure() && needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Delete failed draft release and tag
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes || true
          gh api -X DELETE "repos/${{ github.repository }}/git/refs/tags/$TAG" || true
